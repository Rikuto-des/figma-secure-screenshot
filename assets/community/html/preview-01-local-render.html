<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1600, initial-scale=1" />
    <title>Local render preview</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 1600px; height: 1000px; margin: 0; overflow: hidden; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
        color: #111827;
        background: #f4f7fb;
      }
      .stage {
        width: 1600px;
        height: 1000px;
        padding: 76px 86px;
        display: grid;
        grid-template-columns: 0.85fr 1.15fr;
        gap: 58px;
        align-items: center;
      }
      .copy { max-width: 520px; }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border: 1px solid #c7d2fe;
        border-radius: 999px;
        background: #eef2ff;
        color: #3730a3;
        font-size: 19px;
        font-weight: 700;
      }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: #2563eb; }
      h1 {
        margin: 34px 0 0;
        font-size: 70px;
        line-height: 1;
        letter-spacing: -0.03em;
        font-weight: 720;
      }
      p {
        margin: 28px 0 0;
        color: #4b5563;
        font-size: 30px;
        line-height: 1.34;
        font-weight: 560;
      }
      .canvas {
        position: relative;
        height: 750px;
        border-radius: 32px;
        background: #ffffff;
        box-shadow: 0 38px 90px rgba(15, 23, 42, 0.16);
        overflow: hidden;
        border: 1px solid #e5e7eb;
      }
      .toolbar {
        height: 76px;
        display: flex;
        align-items: center;
        gap: 13px;
        padding: 0 28px;
        border-bottom: 1px solid #e5e7eb;
        background: #fbfdff;
      }
      .circle { width: 14px; height: 14px; border-radius: 50%; background: #d1d5db; }
      .circle.blue { background: #3b82f6; }
      .tool-pill { margin-left: 14px; width: 190px; height: 26px; border-radius: 999px; background: #e5e7eb; }
      .work {
        display: grid;
        grid-template-columns: 210px 1fr 230px;
        height: calc(100% - 76px);
      }
      .panel {
        padding: 26px 22px;
        background: #f8fafc;
        border-right: 1px solid #e5e7eb;
      }
      .panel.right { border-right: 0; border-left: 1px solid #e5e7eb; }
      .row { height: 18px; border-radius: 6px; background: #dbe3ef; margin-bottom: 18px; }
      .row.short { width: 58%; }
      .artboard {
        position: relative;
        padding: 42px;
        background-image:
          linear-gradient(#eef2f7 1px, transparent 1px),
          linear-gradient(90deg, #eef2f7 1px, transparent 1px);
        background-size: 34px 34px;
      }
      .frame {
        width: 410px;
        height: 510px;
        margin: 18px auto 0;
        border-radius: 30px;
        background: #ffffff;
        box-shadow: 0 18px 42px rgba(15, 23, 42, 0.14);
        border: 2px solid #3b82f6;
        padding: 30px;
      }
      .hero { height: 140px; border-radius: 22px; background: linear-gradient(135deg, #dbeafe, #f0fdf4); margin-bottom: 24px; }
      .line { height: 16px; border-radius: 999px; background: #cbd5e1; margin-bottom: 14px; }
      .line.big { height: 24px; width: 65%; background: #111827; }
      .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 24px; }
      .card { height: 92px; border-radius: 18px; background: #f1f5f9; }
      .export {
        position: absolute;
        right: 70px;
        bottom: 54px;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 18px 22px;
        border-radius: 18px;
        background: #111827;
        color: white;
        box-shadow: 0 18px 38px rgba(15, 23, 42, 0.24);
        font-size: 22px;
        font-weight: 700;
      }
      .check { width: 28px; height: 28px; border-radius: 50%; background: #22c55e; }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="copy">
        <div class="eyebrow"><span class="dot"></span>Local screenshot render</div>
        <h1>Rendered inside Figma desktop</h1>
        <p>Selected frames are exported through the local plugin API, similar to Copy as PNG.</p>
      </section>
      <section class="canvas" aria-label="Local render diagram">
        <div class="toolbar"><span class="circle"></span><span class="circle"></span><span class="circle blue"></span><span class="tool-pill"></span></div>
        <div class="work">
          <aside class="panel"><div class="row"></div><div class="row short"></div><div class="row"></div><div class="row short"></div><div class="row"></div></aside>
          <div class="artboard">
            <div class="frame">
              <div class="hero"></div>
              <div class="line big"></div>
              <div class="line"></div>
              <div class="line short"></div>
              <div class="cards"><div class="card"></div><div class="card"></div></div>
            </div>
            <div class="export"><span class="check"></span>PNG returned inline</div>
          </div>
          <aside class="panel right"><div class="row"></div><div class="row"></div><div class="row short"></div><div class="row"></div><div class="row short"></div></aside>
        </div>
      </section>
    </main>
  </body>
</html>
