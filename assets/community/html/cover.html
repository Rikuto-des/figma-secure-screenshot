<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, initial-scale=1" />
    <title>Yasuda Figma MCP Cover</title>
    <style>
      :root {
        --ink: #f8fafc;
        --muted: #cbd5e1;
        --blue: #3b82f6;
        --green: #16a34a;
        --black: #111827;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 960px;
        margin: 0;
        overflow: hidden;
        background: var(--black);
      }

      body {
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      }

      .cover {
        position: relative;
        width: 1920px;
        height: 960px;
        overflow: hidden;
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(17, 24, 39, 0.92) 0%, rgba(17, 24, 39, 0.76) 34%, rgba(17, 24, 39, 0.24) 62%, rgba(17, 24, 39, 0.1) 100%),
          linear-gradient(180deg, rgba(17, 24, 39, 0.2), rgba(17, 24, 39, 0.22) 58%, rgba(17, 24, 39, 0.72)),
          url("../ai/cover-photo-1920x960.png") center / cover no-repeat;
      }

      .cover::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(0, 0, 0, 0.18), transparent 56%),
          radial-gradient(circle at 18% 18%, rgba(59, 130, 246, 0.16), transparent 28%);
        opacity: 0.9;
      }

      .content {
        position: absolute;
        left: 120px;
        top: 122px;
        width: 900px;
        z-index: 2;
      }

      .kicker {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        height: 48px;
        padding: 0 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.7);
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.22);
        color: #dbeafe;
        font-size: 20px;
        font-weight: 720;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        backdrop-filter: blur(12px);
      }

      .kicker::before {
        content: "";
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #22c55e;
      }

      h1 {
        margin: 46px 0 0;
        max-width: 900px;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
        font-size: 86px;
        line-height: 1.04;
        font-weight: 720;
        letter-spacing: -0.025em;
        text-wrap: balance;
        text-shadow: 0 18px 52px rgba(0, 0, 0, 0.5);
      }

      .lede {
        margin: 34px 0 0;
        max-width: 740px;
        color: #e2e8f0;
        font-size: 32px;
        line-height: 1.3;
        font-weight: 620;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.52);
      }

      .badges {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 50px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        height: 54px;
        padding: 0 22px;
        border: 1px solid rgba(226, 232, 240, 0.2);
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.64);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 18px 44px rgba(0, 0, 0, 0.2);
        color: #f8fafc;
        font-size: 21px;
        font-weight: 700;
        backdrop-filter: blur(12px);
      }

      .badge:nth-child(1) {
        border-color: rgba(34, 197, 94, 0.36);
      }

      .badge:nth-child(2) {
        border-color: rgba(59, 130, 246, 0.36);
      }

      .badge:nth-child(3) {
        border-color: rgba(148, 163, 184, 0.34);
      }

      .caption {
        position: absolute;
        left: 122px;
        bottom: 72px;
        z-index: 2;
        color: rgba(226, 232, 240, 0.68);
        font-size: 22px;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <main class="cover" aria-label="Yasuda Figma MCP community cover">
      <section class="content">
        <div class="kicker">Local first Figma MCP</div>
        <h1>Maid-Figma-MCP</h1>
        <p class="lede">Secure read-only design context for GitHub Copilot, rendered inside your running Figma app.</p>
        <div class="badges" aria-hidden="true">
          <span class="badge">No public S3</span>
          <span class="badge">Read-only tools</span>
          <span class="badge">Private tunnel</span>
        </div>
      </section>
      <div class="caption">Figma desktop -> local bridge -> Copilot</div>
    </main>
  </body>
</html>
