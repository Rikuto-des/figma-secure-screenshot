<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, initial-scale=1" />
    <title>Yasuda Figma MCP Cover</title>
    <style>
      :root {
        --ink: #f7fbff;
        --muted: #9fb1c6;
        --blue: #67a8ff;
        --green: #4af08b;
        --violet: #b08cff;
        --black: #050811;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 960px;
        margin: 0;
        overflow: hidden;
        background: var(--black);
      }

      body {
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "Helvetica Neue", sans-serif;
      }

      .cover {
        position: relative;
        width: 1920px;
        height: 960px;
        overflow: hidden;
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(4, 7, 15, 0.94) 0%, rgba(4, 7, 15, 0.77) 34%, rgba(4, 7, 15, 0.18) 66%, rgba(4, 7, 15, 0.58) 100%),
          linear-gradient(180deg, rgba(2, 5, 12, 0.55), rgba(2, 5, 12, 0.16) 46%, rgba(2, 5, 12, 0.86)),
          url("../ai/cover-1920x960.png") center / cover no-repeat;
      }

      .cover::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 28% 40%, rgba(103, 168, 255, 0.18), transparent 30%),
          radial-gradient(circle at 67% 55%, rgba(74, 240, 139, 0.2), transparent 28%),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 92px);
        mix-blend-mode: screen;
        opacity: 0.78;
      }

      .cover::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: linear-gradient(90deg, black, transparent 58%);
        opacity: 0.2;
      }

      .content {
        position: absolute;
        left: 118px;
        top: 116px;
        width: 850px;
        z-index: 2;
      }

      .kicker {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        height: 52px;
        padding: 0 22px;
        border: 1px solid rgba(122, 255, 179, 0.34);
        border-radius: 999px;
        background: rgba(2, 14, 16, 0.62);
        box-shadow: 0 0 44px rgba(74, 240, 139, 0.16);
        color: #c7ffe1;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .kicker::before {
        content: "";
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 18px var(--green);
      }

      h1 {
        margin: 52px 0 0;
        max-width: 840px;
        font-family: "Didot", "Bodoni 72", Georgia, serif;
        font-size: 126px;
        line-height: 0.92;
        font-weight: 700;
        letter-spacing: -0.01em;
        text-wrap: balance;
        text-shadow: 0 18px 54px rgba(0, 0, 0, 0.65);
      }

      .lede {
        margin: 38px 0 0;
        max-width: 760px;
        color: #d9e6f4;
        font-size: 38px;
        line-height: 1.22;
        font-weight: 650;
        text-shadow: 0 12px 40px rgba(0, 0, 0, 0.58);
      }

      .badges {
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        margin-top: 54px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        height: 58px;
        padding: 0 26px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 18px;
        background: rgba(7, 13, 25, 0.72);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 20px 54px rgba(0, 0, 0, 0.28);
        color: #eaf4ff;
        font-size: 23px;
        font-weight: 800;
      }

      .badge:nth-child(1) {
        border-color: rgba(74, 240, 139, 0.38);
        color: #baffd5;
      }

      .badge:nth-child(2) {
        border-color: rgba(103, 168, 255, 0.42);
        color: #cce2ff;
      }

      .badge:nth-child(3) {
        border-color: rgba(176, 140, 255, 0.38);
        color: #e0d2ff;
      }

      .device {
        position: absolute;
        right: 104px;
        bottom: 86px;
        width: 606px;
        height: 176px;
        z-index: 2;
        border: 1px solid rgba(133, 168, 215, 0.24);
        border-radius: 44px;
        background:
          linear-gradient(135deg, rgba(16, 26, 43, 0.88), rgba(6, 11, 22, 0.82)),
          radial-gradient(circle at 20% 10%, rgba(103, 168, 255, 0.18), transparent 35%);
        box-shadow: 0 42px 130px rgba(0, 0, 0, 0.62), inset 0 1px 0 rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(14px);
      }

      .device::before,
      .device::after {
        content: "";
        position: absolute;
        top: 46px;
        height: 18px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.17);
      }

      .device::before {
        left: 58px;
        width: 190px;
        box-shadow: 0 42px 0 rgba(103, 168, 255, 0.42), 0 84px 0 rgba(74, 240, 139, 0.36);
      }

      .device::after {
        right: 58px;
        width: 112px;
        background: linear-gradient(90deg, var(--blue), var(--green));
        box-shadow: 0 42px 0 rgba(255, 255, 255, 0.12), 0 84px 0 rgba(255, 255, 255, 0.1);
      }

      .beam {
        position: absolute;
        left: 790px;
        top: 470px;
        width: 692px;
        height: 34px;
        z-index: 2;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, rgba(103, 168, 255, 0.86), rgba(74, 240, 139, 0.96), transparent);
        filter: blur(0.4px) drop-shadow(0 0 24px rgba(103, 168, 255, 0.72));
        transform: rotate(-2deg);
      }

      .beam::before,
      .beam::after {
        content: "";
        position: absolute;
        inset: 12px -10px;
        border-radius: 999px;
        background: inherit;
        filter: blur(16px);
        opacity: 0.7;
      }

      .seal {
        position: absolute;
        left: 1264px;
        top: 402px;
        z-index: 3;
        width: 150px;
        height: 150px;
        border: 2px solid rgba(126, 255, 185, 0.46);
        border-radius: 50%;
        background: rgba(2, 18, 20, 0.44);
        box-shadow: 0 0 62px rgba(74, 240, 139, 0.25), inset 0 0 44px rgba(103, 168, 255, 0.16);
        display: grid;
        place-items: center;
      }

      .lock {
        position: relative;
        width: 56px;
        height: 48px;
        border-radius: 12px;
        background: linear-gradient(180deg, var(--green), #1dbf68);
        box-shadow: 0 0 30px rgba(74, 240, 139, 0.52);
      }

      .lock::before {
        content: "";
        position: absolute;
        left: 10px;
        top: -36px;
        width: 36px;
        height: 42px;
        border: 10px solid #8fffc0;
        border-bottom: 0;
        border-radius: 28px 28px 0 0;
      }

      .caption {
        position: absolute;
        left: 122px;
        bottom: 72px;
        z-index: 2;
        color: rgba(232, 243, 255, 0.62);
        font-size: 22px;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <main class="cover" aria-label="Yasuda Figma MCP community cover">
      <section class="content">
        <div class="kicker">Local first Figma MCP</div>
        <h1>Yasuda<br />Figma MCP</h1>
        <p class="lede">Secure read-only design context for GitHub Copilot, rendered inside your running Figma app.</p>
        <div class="badges" aria-hidden="true">
          <span class="badge">No public S3</span>
          <span class="badge">Read-only tools</span>
          <span class="badge">Private tunnel</span>
        </div>
      </section>
      <div class="beam" aria-hidden="true"></div>
      <div class="seal" aria-hidden="true"><div class="lock"></div></div>
      <div class="device" aria-hidden="true"></div>
      <div class="caption">Figma desktop -> local bridge -> Copilot</div>
    </main>
  </body>
</html>
